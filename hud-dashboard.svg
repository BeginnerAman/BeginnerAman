<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="100%" style="font-family:Consolas, 'Fira Code', Monaco, monospace; font-size: 14px; line-height: 1.5;">
  <defs>
    <!-- Card Shadow and Glow -->
    <filter id="card-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Editor Window Container -->
  <rect width="800" height="240" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1.5" filter="url(#card-shadow)" />

  <!-- Window Titlebar -->
  <path d="M 0,10 A 10,10 0 0 1 10,0 L 790,0 A 10,10 0 0 1 800,10 L 800,35 L 0,35 Z" fill="#161b22" />
  
  <!-- Window Controls (macOS style dots) -->
  <circle cx="20" cy="18" r="6" fill="#ff5f56" />
  <circle cx="40" cy="18" r="6" fill="#ffbd2e" />
  <circle cx="60" cy="18" r="6" fill="#27c93f" />

  <!-- Tab Title -->
  <path d="M 90,35 L 105,12 L 205,12 L 220,35 Z" fill="#0d1117" stroke="#30363d" stroke-width="1" />
  <text x="115" y="26" fill="#c9d1d9" font-size="12" font-weight="600">amanProfile.js</text>
  
  <!-- Editor Line Numbers Column -->
  <rect x="0" y="35" width="45" height="205" fill="#0d1117" />
  <line x1="45" y1="35" x2="45" y2="240" stroke="#30363d" stroke-width="1" />
  
  <text x="20" y="65" fill="#30363d" text-anchor="middle" font-size="12">1</text>
  <text x="20" y="87" fill="#30363d" text-anchor="middle" font-size="12">2</text>
  <text x="20" y="109" fill="#30363d" text-anchor="middle" font-size="12">3</text>
  <text x="20" y="131" fill="#30363d" text-anchor="middle" font-size="12">4</text>
  <text x="20" y="153" fill="#30363d" text-anchor="middle" font-size="12">5</text>
  <text x="20" y="175" fill="#30363d" text-anchor="middle" font-size="12">6</text>
  <text x="20" y="197" fill="#30363d" text-anchor="middle" font-size="12">7</text>
  <text x="20" y="219" fill="#30363d" text-anchor="middle" font-size="12">8</text>

  <!-- Syntax Highlighted Code Lines -->
  <g transform="translate(60, 0)">
    <!-- Line 1: const developer = { -->
    <text x="0" y="65" font-size="14">
      <tspan fill="#ff7b72">const</tspan>
      <tspan fill="#d2a8ff"> developer</tspan>
      <tspan fill="#c9d1d9"> = {</tspan>
    </text>

    <!-- Line 2: name: "Aman Vishwakarma", -->
    <text x="20" y="87" font-size="14">
      <tspan fill="#79c0ff">name</tspan>
      <tspan fill="#c9d1d9">: </tspan>
      <tspan fill="#a5d6ff">"Aman Vishwakarma"</tspan>
      <tspan fill="#c9d1d9">,</tspan>
    </text>

    <!-- Line 3: AI_Collaborator: true, -->
    <text x="20" y="109" font-size="14">
      <tspan fill="#79c0ff">aiCollaborative</tspan>
      <tspan fill="#c9d1d9">: </tspan>
      <tspan fill="#ff5874">true</tspan>
      <tspan fill="#c9d1d9">,</tspan>
    </text>

    <!-- Line 4: publicProjects: 26, -->
    <text x="20" y="131" font-size="14">
      <tspan fill="#79c0ff">publicProjects</tspan>
      <tspan fill="#c9d1d9">: </tspan>
      <tspan fill="#d2a8ff">26</tspan>
      <tspan fill="#c9d1d9">,</tspan>
    </text>

    <!-- Line 5: focus: "Building rapid products from creative concepts" -->
    <text x="20" y="153" font-size="14">
      <tspan fill="#79c0ff">focus</tspan>
      <tspan fill="#c9d1d9">: </tspan>
      <tspan fill="#a5d6ff">"Ideas to code, powered by AI"</tspan>
      <tspan fill="#c9d1d9">,</tspan>
    </text>

    <!-- Line 6: specialties: ["Real-time Chat", "Web Games", "Utility Calculators"] -->
    <text x="20" y="175" font-size="14">
      <tspan fill="#79c0ff">specialties</tspan>
      <tspan fill="#c9d1d9">: [</tspan>
      <tspan fill="#a5d6ff">"Real-Time Chat"</tspan>
      <tspan fill="#c9d1d9">, </tspan>
      <tspan fill="#a5d6ff">"Web Games"</tspan>
      <tspan fill="#c9d1d9">, </tspan>
      <tspan fill="#a5d6ff">"Utility Tools"</tspan>
      <tspan fill="#c9d1d9">]</tspan>
    </text>

    <!-- Line 7: status: "Offline ideating // Online building" -->
    <text x="20" y="197" font-size="14">
      <tspan fill="#79c0ff">status</tspan>
      <tspan fill="#c9d1d9">: </tspan>
      <tspan fill="#a5d6ff">"Offline ideating // Online building"</tspan>
    </text>

    <!-- Line 8: }; -->
    <text x="0" y="219" fill="#c9d1d9" font-size="14">};</text>
  </g>

  <!-- Subtle Neon Gradient Border Overlay for aesthetic touch -->
  <rect width="800" height="240" rx="10" fill="none" stroke="url(#border-gradient)" stroke-width="1.5" pointer-events="none" />
  
  <defs>
    <linearGradient id="border-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.4" />
      <stop offset="50%" stop-color="#6c5ce7" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0.4" />
    </linearGradient>
  </defs>
</svg>
